<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omad G'ildiragi</title>
    <script src="https://telegram.org"></script>
    <script src="https://adsgram.ai"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a2e; color: #fff; padding: 20px; margin: 0; }
        .wheel-container { position: relative; width: 250px; height: 250px; margin: 30px auto; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #fff; background: conic-gradient(#ff2a5f 0% 16%, #ffb800 16% 33%, #00b8ff 33% 50%, #00ff66 50% 66%, #8a2be2 66% 83%, #ff6b6b 83% 100%); transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #fff; z-index: 10; }
        button { background: #ff2a5f; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 25px; cursor: pointer; margin-top: 20px; font-weight: bold; width: 80%; }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>
    <h2>🎡 OMAD G'ILDIRAGI 🎡</h2>
    <p>G'ildirakni aylantirish uchun videoni oxirigacha ko'ring!</p>
    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
    </div>
    <button id="spinBtn" onclick="showAd()">📺 Video ko'rish va Aylantirish</button>
      <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ⚠️ DIQQAT: "YOUR_BLOCK_ID_HERE" o'rniga AdsGram'dan olgan haqiqiy block-id kodini yozing!
        const AdController = window.Adsgram.init({ blockId: "YOUR_BLOCK_ID_HERE" });

        function showAd() {
            document.getElementById("spinBtn").disabled = true;
            AdController.show().then((result) => {
                startSpin();
            }).catch((error) => {
                alert("Reklama yuklanmadi yoki oxirigacha ko'rilmadi! Qayta urining.");
                document.getElementById("spinBtn").disabled = false;
            });
        }

        function startSpin() {
            const wheel = document.getElementById("wheel");
            const randomDegrees = Math.floor(Math.random() * 360) + 1440; 
            wheel.style.transform = `rotate(${randomDegrees}deg)`;

            setTimeout(() => {
                tg.sendData(JSON.stringify({ action: "wheel_spin_success" }));
                tg.close();
            }, 4100);
        }
    </script>
</body>
</html>
