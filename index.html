<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omad G'ildiragi</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a2e; color: #fff; padding: 15px; margin: 0; overflow-y: auto; }
        .main-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; padding-bottom: 30px; }
        .wheel-container { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #fff; background: conic-gradient(#ff2a5f 0deg 30deg, #333333 30deg 60deg, #ffb800 60deg 90deg, #333333 90deg 120deg, #00b8ff 120deg 150deg, #333333 150deg 180deg, #00ff66 180deg 210deg, #333333 210deg 240deg, #8a2be2 240deg 270deg, #333333 270deg 300deg, #ff6b6b 300deg 330deg, #333333 330deg 360deg); position: relative; overflow: hidden; transform: rotate(0deg); }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #fff; z-index: 10; }
        
        .label { position: absolute; width: 50%; height: 20px; top: calc(50% - 10px); left: 50%; transform-origin: 0% 50%; text-align: right; padding-right: 15px; box-sizing: border-box; font-weight: bold; font-size: 10px; text-shadow: 1px 1px 2px #000; }
        .l1 { transform: rotate(15deg); }
        .l2 { transform: rotate(45deg); color: #888; font-size: 8px; }
        .l3 { transform: rotate(75deg); }
        .l4 { transform: rotate(105deg); color: #888; font-size: 8px; }
        .l5 { transform: rotate(135deg); }
        .l6 { transform: rotate(165deg); color: #888; font-size: 8px; }
        .l7 { transform: rotate(195deg); }
        .l8 { transform: rotate(225deg); color: #888; font-size: 8px; }
        .l9 { transform: rotate(255deg); }
        .l10 { transform: rotate(285deg); color: #888; font-size: 8px; }
        .l11 { transform: rotate(315deg); }
        .l12 { transform: rotate(345deg); color: #888; font-size: 8px; }

        button { background: #ff2a5f; color: white; border: none; padding: 14px 20px; font-size: 16px; border-radius: 25px; cursor: pointer; margin-top: 15px; font-weight: bold; width: 85%; box-shadow: 0 4px 15px rgba(255, 42, 95, 0.4); z-index: 5; }
        button:disabled { background: #555; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <h2>🎡 OMAD G'ILDIRAGI 🎡</h2>
        <p id="infoText" style="font-size: 13px; margin: 5px 0;">Omadingizni sinab ko'ring!</p>
        
        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="wheel" id="wheel">
                <div class="label l1">1 EFC</div>
                <div class="label l2">YUTQAZISH</div>
                <div class="label l3">10 EFC</div>
                <div class="label l4">YUTQAZISH</div>
                <div class="label l5">50 EFC</div>
                <div class="label l6">YUTQAZISH</div>
                <div class="label l7">250 EFC</div>
                <div class="label l8">YUTQAZISH</div>
                <div class="label l9">130 COIN</div>
                <div class="label l10">YUTQAZISH</div>
                <div class="label l11">2000 COIN</div>
                <div class="label l12">YUTQAZISH</div>
            </div>
        </div>
        <!-- 🎰 Tugma bosilganda JavaScript datchigini to'g'ridan-to'g'ri chaqiruvchi buyruq -->
        <button id="spinBtn" onclick="executeSpinAnimation()">🎰 Aylantirish</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        
        // Telegram oynasini to'liq ekranga yoyish va tayyor holatga keltirish
        tg.ready();
        tg.expand();

        const infoText = document.getElementById("infoText");
        const spinBtn = document.getElementById("spinBtn");
        const wheel = document.getElementById("wheel");

        // Bosish (click) buyrug'i to'g'ridan-to'g'ri shu funksiyaga bog'landi
        function executeSpinAnimation() {
            // Tugmani qayta bosilmasligi uchun o'chiramiz
            spinBtn.disabled = true;
            infoText.innerText = "G'ildirak aylanmoqda, omad...";

            // CSS transformatsiya animatsiyasini qo'shamiz (4 soniya silliq aylanish)
            wheel.style.transition = "transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)";
            
            // Tasodifiy burchak ostida kamida 4 marta to'liq aylantirish mexanikasi
            const randomDegrees = Math.floor(Math.random() * 360) + 1440; 
            wheel.style.transform = `rotate(${randomDegrees}deg)`;

            // 4.1 soniyadan keyin aylanish to'xtaydi va natija botga ketadi
            setTimeout(() => {
                // Telegram botiga aylanish muvaffaqiyatli yakunlanganlik signalini yuboramiz
                tg.sendData(JSON.stringify({ action: "wheel_spin_success" }));
                
                // Oynani avtomatik yopish
                setTimeout(() => {
                    tg.close();
                }, 500);
            }, 4100);
        }
    </script>
</body>
</html>
