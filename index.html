<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omad G'ildiragi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background: #1a1a2e; 
            color: #fff; 
            padding: 15px; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .wheel-container { 
            position: relative; 
            width: 300px; 
            height: 300px; 
            margin: 20px auto; 
        }
        
        .wheel { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            border: 8px solid #fff; 
            background: conic-gradient(
                #ff2a5f 0deg 30deg, #333 30deg 60deg, 
                #ffb800 60deg 90deg, #333 90deg 120deg, 
                #00b8ff 120deg 150deg, #333 150deg 180deg, 
                #00ff66 180deg 210deg, #333 210deg 240deg, 
                #8a2be2 240deg 270deg, #333 270deg 300deg, 
                #ff6b6b 300deg 330deg, #333 330deg 360deg
            ); 
            position: relative; 
            overflow: hidden; 
            transform: rotate(0deg); 
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); 
        }

        .pointer { 
            position: absolute; 
            top: -20px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 0; 
            height: 0; 
            border-left: 20px solid transparent; 
            border-right: 20px solid transparent; 
            border-top: 30px solid #fff; 
            z-index: 10; 
        }
        
        .label { 
            position: absolute; 
            width: 50%; 
            height: 40px; 
            top: calc(50% - 20px); 
            left: 50%; 
            transform-origin: 0% 50%; 
            text-align: right; 
            padding-right: 10px; 
            box-sizing: border-box; 
            font-weight: bold; 
            font-size: 11px; 
            color: white;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        /* Har bir sektor uchun rotatsiya */
        .l1 { transform: rotate(15deg); }
        .l2 { transform: rotate(45deg); color: #aaa; }
        .l3 { transform: rotate(75deg); }
        .l4 { transform: rotate(105deg); color: #aaa; }
        .l5 { transform: rotate(135deg); }
        .l6 { transform: rotate(165deg); color: #aaa; }
        .l7 { transform: rotate(195deg); }
        .l8 { transform: rotate(225deg); color: #aaa; }
        .l9 { transform: rotate(255deg); }
        .l10 { transform: rotate(285deg); color: #aaa; }
        .l11 { transform: rotate(315deg); }
        .l12 { transform: rotate(345deg); color: #aaa; }

        button { 
            background: #ff2a5f; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            font-size: 18px; 
            border-radius: 30px; 
            cursor: pointer; 
            margin-top: 20px; 
            font-weight: bold; 
            width: 250px;
            box-shadow: 0 4px 15px rgba(255, 42, 95, 0.4); 
        }
        button:disabled { background: #555; }
    </style>
</head>
<body>

    <h2>🎡 OMAD G'ILDIRAGI 🎡</h2>
    <p id="infoText">Omadingizni sinab ko'ring!</p>
    
    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel" id="wheel">
            <div class="label l1">1 EFC</div>
            <div class="label l2">YUTQAZISH</div>
            <div class="label l3">10 EFC</div>
            <div class="label l4">YUTQAZISH</div>
            <div class="label l5">50 EFC</div>
            <div class="label l6">YUTQAZISH</div>
            <div class="label l7">250 EFC</div>
            <div class="label l8">YUTQAZISH</div>
            <div class="label l9">130 COIN</div>
            <div class="label l10">YUTQAZISH</div>
            <div class="label l11">2000 COIN</div>
            <div class="label l12">YUTQAZISH</div>
        </div>
    </div>
    
    <button id="spinBtn" onclick="startSpinning()">🎰 Aylantirish</button>

    <script>
        // Telegram WebApp obyektini xavfsiz chaqirish
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const wheel = document.getElementById("wheel");
        const spinBtn = document.getElementById("spinBtn");
        const infoText = document.getElementById("infoText");

        function startSpinning() {
            spinBtn.disabled = true;
            infoText.innerText = "Aylanmoqda...";
            
            // Tasodifiy burchak: 4-6 marta to'liq aylanish (1440-2160 gradus) + random
            const minRotations = 4;
            const extraDegrees = Math.floor(Math.random() * 360);
            const totalDegrees = (minRotations * 360) + extraDegrees;

            // Aylantirishni boshlash
            wheel.style.transform = `rotate(${totalDegrees}deg)`;

            // Animatsiya tugagach (4 soniya)
            setTimeout(() => {
                infoText.innerText = "Natija aniqlandi!";
                
                // Telegram botiga ma'lumot yuborish
                if (tg.initDataUnsafe) {
                    tg.sendData(JSON.stringify({ 
                        action: "wheel_spin", 
                        degree: extraDegrees 
                    }));
                } else {
                    console.log("Telegram muhiti topilmadi, natija yuborilmadi.");
                }

                // 1 soniya kutib oynani yopish
                setTimeout(() => {
                    tg.close();
                }, 1000);
            }, 4100);
        }
    </script>
</body>
</html>
